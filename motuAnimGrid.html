<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Pixels of the Universe - MotU pixel art</title>
    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #grid {
            width: 100vw;
            height: 100vh;
            display: grid;
            overflow: hidden;
            gap: 0;
            margin: 0;
            padding: 0;
        }

        img {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            transform: scale(1);
        }

        .cell {
            width: 96px;
            height: 96px;
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* estä sub-pixel välit: */
            outline: 1px solid transparent;
        }

        .cell img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
            display: block;
        }


        #grid,
        .cell,
        img {
            transform: translateZ(0);
        }
    </style>
</head>

        const grid = document.getElementById("grid");
        let cells = [];

        const CELL_SIZE = 96;

        const cols = Math.ceil(window.innerWidth / CELL_SIZE);
        const rows = Math.ceil(window.innerHeight / CELL_SIZE);

        const CELL_COUNT = cols * rows;

        // Luo ruudut
        for (let i = 0; i < CELL_COUNT; i++) {

            const div = document.createElement("div");
            div.className = "cell";

            const img = document.createElement("img");
            const charIndex = i % MOTU_LIB.length;
            const PIXEL_IMAGE = MOTU_LIB[charIndex].b64;
            img.src = "data:image/png;base64," + PIXEL_IMAGE;

            img.dataset.characterId = charIndex;

            div.appendChild(img);
            grid.appendChild(div);

            cells.push(div);
        }
        cells.forEach(cell => {
            cell.style.backgroundColor = randomColor();
        });

        function swapRandomCells() {
            let a = Math.floor(Math.random() * CELL_COUNT);
            let b = Math.floor(Math.random() * CELL_COUNT);
            while (a === b) b = Math.floor(Math.random() * CELL_COUNT);

            if (cells[a].dataset.hasVariant || cells[b].dataset.hasVariant) return;  // ohita varianttitilassa olevat

            const imgA = cells[a].querySelector("img");
            const imgB = cells[b].querySelector("img");
            const tempSrc = imgA.src;
            const tempId = imgA.dataset.characterId;
            imgA.src = imgB.src;
            imgA.dataset.characterId = imgB.dataset.characterId;
            imgB.src = tempSrc;
            imgB.dataset.characterId = tempId;
        }

        function flipRandomCell() {
            const i = Math.floor(Math.random() * CELL_COUNT);
            const img = cells[i].querySelector("img");
            // Togglee peilaus CSS-transformilla
            const isFlipped = img.style.transform === "scaleX(-1)";
            img.style.transform = isFlipped ? "" : "scaleX(-1)";
        }

        function changeRandomBackground() {
            const index = Math.floor(Math.random() * cells.length);
            const cell = cells[index];

            const color = colors[Math.floor(Math.random() * colors.length)];
            cell.style.backgroundColor = color;
        }
        function randomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function swapVariantInRandomCell() {
            const cellsWithVariants = [...cells].filter(cell => {
                if (cell.dataset.hasVariant) return false;  // ohita jos jo varianttitilassa
                const charIndex = parseInt(cell.querySelector("img").dataset.characterId);
                const name = MOTU_LIB[charIndex].name.toLowerCase();
                return VARIANTS[name] !== undefined;
            });
            if (cellsWithVariants.length === 0) return;

            const cell = cellsWithVariants[Math.floor(Math.random() * cellsWithVariants.length)];
            const img = cell.querySelector("img");
            const charIndex = parseInt(img.dataset.characterId);
            const name = MOTU_LIB[charIndex].name.toLowerCase();
            const variants = VARIANTS[name];

            const originalSrc = img.src;
            cell.dataset.hasVariant = "1";  // merkitään varianttitilaan
            img.src = "data:image/png;base64," + variants[Math.floor(Math.random() * variants.length)];

            setTimeout(() => {
                img.src = originalSrc;
                delete cell.dataset.hasVariant;  // poistetaan merkintä
            }, 600);
        }

        setInterval(() => {
            const roll = Math.random();
            if (roll < 0.35) {
                swapVariantInRandomCell();
            } else if (roll < 0.60) {
                flipRandomCell();
            } else {
                swapRandomCells();
            }
        }, 150);

        setInterval(() => {
            changeRandomBackground();
        }, 40);

        grid.style.gridTemplateColumns =
            `repeat(${cols}, ${CELL_SIZE}px)`;

        grid.style.gridTemplateRows =
            `repeat(${rows}, ${CELL_SIZE}px)`;

        document.addEventListener("click", () => {
            window.location.href = "https://lowkeytoygeek.github.io/motu/";
        });

    </script>
